services:
  frontend:
    build:
      context: .
      args:
        VITE_BRAND_NAME: ${VITE_BRAND_NAME:-StatusGate}
        VITE_BRAND_LOGO_URL: ${VITE_BRAND_LOGO_URL:-}
        VITE_BRAND_TAGLINE: ${VITE_BRAND_TAGLINE:-Service status monitoring}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    environment:
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-host.docker.internal:8000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
